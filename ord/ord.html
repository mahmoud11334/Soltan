<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="موقع مطعم السلطان رفاعي العالمي">

    <link rel="icon" href="../img/logo.png" type="image/png">
    <meta name="keywords" content="Egyptian restaurant, Koshary, Oriental pizza, Traditional food, Cairo restaurant, Ain Shams, كشري, بيتزا, مطعم, عين شمس">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Akronim&family=Alkalami&family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Architects+Daughter&family=Aref+Ruqaa+Ink:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Badeen+Display&family=Baskervville:ital,wght@0,400..700;1,400..700&family=Bodoni+Moda+SC:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Bytesized&family=Cairo+Play:wght@200..1000&family=Cairo:wght@200..1000&family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Changa:wght@200..800&family=Coral+Pixels&family=Corinthia:wght@400;700&family=Creepster&family=Danfo&family=Edu+AU+VIC+WA+NT+Dots:wght@400..700&family=Fascinate+Inline&family=Fruktur:ital@0;1&family=Fustat:wght@200..800&family=Handjet:wght,ELSH@100..900,2&family=Jersey+25+Charted&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Kavivanar&family=LINE+Seed+JP&family=Lalezar&family=Lateef:wght@200;300;400;500;600;700;800&family=Libertinus+Keyboard&family=Libre+Barcode+39+Extended&family=Mada:wght@200..900&family=Marhey:wght@300..700&family=Mirza:wght@400;500;600;700&family=Moirai+One&family=Nabla&family=Noto+Serif+Khitan+Small+Script&family=Oi&family=Oswald:wght@200..700&family=Palette+Mosaic&family=Playwrite+CU+Guides&family=Playwrite+NZ+Basic+Guides&family=Playwrite+NZ+Basic:wght@100..400&family=Qahiri&family=Rakkas&family=Reem+Kufi+Fun:wght@400..700&family=Reem+Kufi+Ink&family=Reem+Kufi:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik+80s+Fade&family=Rubik+Broken+Fax&family=Rubik+Moonrocks&family=Rubik+Wet+Paint&family=Rubik:ital,wght@0,300..900;1,300..900&family=Ruge+Boogie&family=Ruwudu:wght@400;500;600;700&family=SN+Pro:ital,wght@0,200..900;1,200..900&family=Scheherazade+New:wght@400;500;600;700&family=Stalinist+One&family=Tajawal:wght@200;300;400;500;700;800;900&family=Trade+Winds&family=Train+One&family=Vibes&family=Zilla+Slab+Highlight:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
        <img src="../img/logo.png" alt="logo" class="logo-icon" />
      <span class="logo-text">السلطان رفاعي</span>
    </div>
    <h1 class="site-title">اطلب و اتسلطن</h1>
    <div class="header-spacer"></div>
  </header>

  <!-- CATEGORIES -->
  <nav class="categories-nav" id="categoriesNav"></nav>

  <!-- PRODUCTS GRID -->
  <main class="products-section">
    <div class="products-grid" id="productsGrid"></div>
  </main>

  <!-- FLOATING CART BUTTON -->
  <div class="cart-float" id="cartFloat" style="display:none;" onclick="openCart()">
    <span class="cart-float-icon">⨀</span>
    <span class="cart-float-label">خلاص خلصت</span>
    <span class="cart-float-count" id="cartCount">0</span>
  </div>

  <!-- CART MODAL -->
  <div class="modal-overlay" id="cartModal" style="display:none;">
    <div class="modal-box">
      <button class="modal-close" onclick="closeCart()">✕</button>
      <h2 class="modal-title">طلبك</h2>

      <div class="cart-items" id="cartItems"></div>

      <div class="form-section">
        <input class="form-input" type="text" id="clientName" placeholder="اسمك" />
        <input class="form-input" type="text" id="clientAddress" placeholder="عنوانك" />
        <div class="payment-row">
          <span class="payment-label">طريقة الدفع:</span>
          <label class="pay-opt"><input type="radio" name="payment" value="نقدي" checked /> نقدي</label>
          <label class="pay-opt"><input type="radio" name="payment" value="فيزا" /> فيزا</label>
          <label class="pay-opt"><input type="radio" name="payment" value="محفظة إلكترونية" /> محفظة إلكترونية</label>
        </div>
      </div>

      <button class="confirm-btn" onclick="confirmOrder()">اكمل</button>
    </div>
  </div>

  <script src="ord.js"></script>
</body>
</html>
